<!--
  ============================================================================
  JOHN WILLIAMS BILLBOARD HOOK — WORDPRESS PARENT EMBED SNIPPET
  ============================================================================
  Paste this into a "Custom HTML" block in the WordPress post/page where the
  scrolly should appear.

  How the pin works: .jw-embed-wrap is a tall invisible "track" (420vh) that
  gives you scroll room. .jw-embed-sticky pins at the top of the viewport
  (100vh) for the whole time the track is scrolling past. As you scroll, the
  JS below measures how far through the track you are (0 -> 1) and sends
  that number into the child iframe via pym's postMessage channel; the child
  uses it to drive all its internal animations. The child itself never
  scrolls — only this wrapper does.

  BEFORE PUBLISHING:
  1. Swap CHILD_URL below for wherever index.html actually lives.
       - While iterating: your GitHub Pages URL, e.g.
         https://eesedla.github.io/JW-ScrollyHook/
         (Enable via the repo's Settings -> Pages -> Deploy from branch:
         main / root. Every push to main updates the live page within a
         minute or two, no re-upload needed.)
       - For the live article: upload index.html itself to the WP Media
         Library (same as the billboard photos) and use its direct file URL
         instead. This keeps the published piece off GitHub entirely.
  2. Double-check index.html's own --img-closeup / --img-billboard vars
     point at real Media Library image URLs (not REPLACE_... placeholders).
  3. Adjust --jw-scroll-length below if you want the pinned experience to
     take more or less scrolling to complete (420vh matches the child's own
     standalone preview length, so it feels the same as when you test
     index.html directly in a browser).
  4. FULL-BLEED: two separate problems had to be solved to get
     #jw-embed-wrap to truly span the whole browser width:
       a) WordPress/Gutenberg themes (Newspack included) apply a default
          "max-width:100%" to direct children of .entry-content to keep
          normal content narrow. This silently clamped width:100vw right
          back down to the column width. Fixed by tagging the wrapper
          with the "alignfull" class themes look for to exempt full-bleed
          elements, AND forcing max-width:none with !important as a
          belt-and-suspenders override no matter which selector was
          actually doing the clamping.
       b) The classic CSS-only "50vw" breakout trick (left:50% +
          margin-left:-50vw) only centers correctly when the article
          column itself is horizontally centered in the browser window.
          With a sidebar layout, the column is pushed off-center, so that
          trick overshoots on one side and undershoots on the other by
          the same amount — which is exactly the "fine on the left, cut
          off on the right" bug this produced. Fixed by measuring the
          wrapper's actual offset from the true viewport edge in JS and
          setting margin-left to cancel it out exactly, on load and on
          resize (since a responsive sidebar can appear/disappear).
  5. STICKY PIN BREAKING UNDER "SINGLE WIDE" / "SINGLE FEATURE" TEMPLATES:
     Newspack Theme sets `.site-content { overflow: hidden; }` specifically
     for those two templates (to contain other 100vw-wide full-bleed
     elements, per the theme's own source comments). But an overflow other
     than 'visible' on ANY ancestor between a position:sticky element and
     the page breaks the sticky pin entirely — the symptom is "shows the
     pinned image for one screen, then goes blank" as the content just
     scrolls away normally instead of staying put. The override below
     restores overflow:visible on .site-content specifically for those two
     templates so the pin can work; it's scoped narrowly enough (and this
     embed already constrains its own width to exactly 100vw) that it
     shouldn't reintroduce the horizontal-scrollbar issue that safeguard
     exists for. If you're not using either template, this rule is inert.
  ============================================================================
-->
<style>
  /* Newspack Theme has no native per-post "hide title" toggle for classic
     posts, so this visually hides the category tag / headline / byline /
     share-icon block above the scrolly. Uses the standard "visually
     hidden" technique (position:absolute + clipped to 1px) rather than
     display:none, so the title stays in the page and in the accessibility
     tree for screen readers — it's just not shown on screen, since the
     scrolly's own headline text takes over that role visually. Scoped to
     just this post since it only takes effect wherever this Custom HTML
     block is placed. Remove this rule if you ever want the title bar
     visible again above the embed. */
  .entry-header{
    position:absolute!important;
    width:1px!important; height:1px!important;
    padding:0!important; margin:-1px!important;
    overflow:hidden!important; clip:rect(0,0,0,0)!important;
    white-space:nowrap!important; border:0!important;
  }

  /* the AddToAny share-buttons plugin renders its own row separately from
     .entry-header, right above the rest of .entry-content — hide it too so
     nothing but the scrolly sits below the site nav. Unlike the title,
     these are interactive controls duplicating functionality (share/print
     links) rather than page-identifying content, so display:none (fully
     removed from the tab order) is the right call here, not visually-hidden. */
  .addtoany_share_save_container{ display:none!important; }

  .post-template-single-wide .site-content,
  .post-template-single-feature .site-content { overflow: visible!important; }

  #jw-embed-wrap{
    position:relative!important;
    width:100vw!important;
    max-width:none!important;
    height:var(--jw-scroll-length, 420vh)!important;
    margin:0!important;
  }
  /* Gutenberg/Newspack add block-spacing margin above top-level content
     blocks (including alignfull ones — the width exemption doesn't cover
     vertical spacing), which is what leaves a gap above the embed even
     with the header and share row hidden. */
  .entry-content{ margin-top:0!important; padding-top:0!important; }
  #jw-billboard-hook{ position:sticky!important; top:0!important; height:100vh!important; overflow:hidden; }
  #jw-billboard-hook iframe{ width:100%!important; height:100%!important; border:0!important; display:block; }
</style>

<div id="jw-embed-wrap" class="alignfull">
  <div id="jw-billboard-hook"></div>
</div>

<script src="https://pym.nprapps.org/pym.v1.min.js"></script>
<script>
(function(){
  var CHILD_URL = 'https://eesedla.github.io/JW-ScrollyHook/';

  var wrap = document.getElementById('jw-embed-wrap');
  var pymParent = new pym.Parent('jw-billboard-hook', CHILD_URL, {});

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  function fixBreakoutOffset(){
    wrap.style.marginLeft = '0px';
    var rect = wrap.getBoundingClientRect();
    wrap.style.marginLeft = (-rect.left) + 'px';
  }

  var ticking = false;
  function onScroll(){
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(function(){
      var rect = wrap.getBoundingClientRect();
      var progress = clamp(-rect.top / (rect.height - window.innerHeight), 0, 1);
      pymParent.sendMessage('progress', String(progress));
      ticking = false;
    });
  }

  function onResize(){
    fixBreakoutOffset();
    onScroll();
  }

  window.addEventListener('scroll', onScroll, {passive:true});
  window.addEventListener('resize', onResize);
  fixBreakoutOffset();
  onScroll();
})();
</script>
